name: Deploy Docs (MkDocs Material → GitHub Pages)

# Publica a documentação de docs/ como site no GitHub Pages.
# Deploy automático quando a doc muda em main; também pode ser disparado manualmente.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Permissões mínimas exigidas pelo deploy oficial do GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy de Pages por vez (sem cancelar um em andamento).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Instalar dependências (MkDocs Material)
        run: pip install -r requirements-docs.txt

      - name: Build do site (estrito — falha em link/âncora quebrada)
        run: mkdocs build --strict

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
