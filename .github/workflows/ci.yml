name: CI Pipeline - Feedback Analytics

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main, homolog]

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: lint + typecheck dos pacotes de backend (api-gateway + ia-analyze).
  # O frontend foi extraído para o repo feedback-analytics-web (CI própria).
  # O typecheck usa tsconfig.ci.json por pacote (exclui testes).
  # ----------------------------------------------------------------------------
  quality:
    name: lint-typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backends/api-gateway/package-lock.json
            services/ia-analyze/package-lock.json
            shared/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix shared
          npm ci --prefix backends/api-gateway
          npm ci --prefix services/ia-analyze

      - name: Run linter (2 pacotes)
        run: npm run lint

      - name: Typecheck (2 pacotes, sem testes)
        run: |
          ./backends/api-gateway/node_modules/.bin/tsc -p backends/api-gateway/tsconfig.ci.json --noEmit
          ./services/ia-analyze/node_modules/.bin/tsc -p services/ia-analyze/tsconfig.ci.json --noEmit

  # ----------------------------------------------------------------------------
  # Job 2: unit + integracao (vitest) dos pacotes de backend, em paralelo via
  # matriz. 100% mockado, nenhum secret necessario.
  # ----------------------------------------------------------------------------
  unit-tests:
    name: unit-tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: api-gateway
            prefix: backends/api-gateway
            test_cmd: npm run test --prefix backends/api-gateway
          - package: ia-analyze
            prefix: services/ia-analyze
            test_cmd: npm run test --prefix services/ia-analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backends/api-gateway/package-lock.json
            services/ia-analyze/package-lock.json
            shared/package-lock.json

      - name: Install dependencies (shared + ${{ matrix.package }})
        run: |
          npm ci --prefix shared
          npm ci --prefix ${{ matrix.prefix }}

      - name: Run vitest (${{ matrix.package }})
        run: ${{ matrix.test_cmd }}
