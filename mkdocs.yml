site_name: Feedback Analytics — Documentação
site_description: Documentação do Feedback Analytics — produto, concepção, arquitetura e referência técnica.
site_url: https://tcc-feedback-analytics.github.io/feedback-analytics/
site_author: TCC Feedback Analytics

repo_name: TCC-Feedback-Analytics/feedback-analytics
repo_url: https://github.com/TCC-Feedback-Analytics/feedback-analytics
edit_uri: edit/main/docs/

docs_dir: docs

# Validação de links: com --strict no CI, link/âncora quebrada (ou arquivo fora da nav) falha o build.
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    unrecognized_links: warn

theme:
  name: material
  language: pt-BR
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Mudar para o modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Mudar para o modo claro
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Início: index.md
  - Visão geral: visao-geral.md
  - Produto:
      - Coleta por QR Code: produto/coleta-qrcode.md
      - QR Code por escopo: produto/qrcode-escopo-dinamico.md
      - Onboarding do catálogo: produto/onboarding-catalogo.md
      - Anti-spam por fingerprint: produto/anti-spam-fingerprint.md
      - Bloqueio de dispositivo: produto/bloqueio-dispositivo.md
      - Privacidade e LGPD: produto/higienizacao-jwt-lgpd.md
      - Análise por IA: produto/filtro-semantico-ia.md
      - Métricas e estatísticas: produto/metricas-e-estatisticas.md
      - Painel de insights: produto/painel-insights-ia.md
      - Regras de negócio: produto/regras-negocio.md
  - Concepção & Requisitos:
      - Personas: concepcao/personas.md
      - Stakeholders: concepcao/stakeholder.md
      - Modelo de negócio: concepcao/modelo-negocio.md
      - Decisão das regras de negócio: concepcao/decisao_regras_negocio.md
      - Requisitos (RF/RNF): concepcao/requisitos-e-funcionalidades.md
      - Casos de uso:
          - Visão geral: concepcao/casos-de-uso/visao-geral.md
          - UC-01 — Cadastro de conta: concepcao/casos-de-uso/uc-01-cadastro-conta.md
          - UC-02 — Login: concepcao/casos-de-uso/uc-02-login.md
          - UC-03 — Recuperação de senha: concepcao/casos-de-uso/uc-03-recuperacao-senha.md
          - UC-04 — Envio de feedback (QR Code): concepcao/casos-de-uso/uc-04-envio-feedback-qrcode.md
          - UC-05 — Geração de QR Code: concepcao/casos-de-uso/uc-05-geracao-qrcode.md
          - UC-06 — Ativação de tipos de feedback: concepcao/casos-de-uso/uc-06-ativacao-tipos-feedback.md
          - UC-07 — Configuração do catálogo: concepcao/casos-de-uso/uc-07-configuracao-catalogo.md
          - UC-08 — Configuração de coleta (contexto IA): concepcao/casos-de-uso/uc-08-configuracao-coleta-ia.md
          - UC-09 — Dashboard: concepcao/casos-de-uso/uc-09-dashboard.md
          - UC-10 — Listagem de feedbacks: concepcao/casos-de-uso/uc-10-listagem-feedbacks.md
          - UC-11 — Insights com IA: concepcao/casos-de-uso/uc-11-insights-ia.md
          - UC-12 — Gestão de perfil: concepcao/casos-de-uso/uc-12-gestao-perfil.md
      - Design (Figma):
          - Product: concepcao/figma/product.md
          - Assets: concepcao/figma/assets.md
          - Protótipo de baixa fidelidade: concepcao/figma/prototipo-de-baixa-fidelidade.md
          - Protótipo de média fidelidade: concepcao/figma/prototipo-de-media-fidelidade.md
          - Protótipo de alta fidelidade: concepcao/figma/prototipo-de-alta-fidelidade.md
  - Arquitetura:
      - Visão de arquitetura: arquitetura/visao-geral.md
      - Modelo conceitual (MER): arquitetura/modelo-conceitual-mer.md
      - Modelagem de dados (DER): arquitetura/modelagem-de-dados.md
      - Histórico de decisões:
          - Monorepo vs. Monolito: arquitetura/historico-de-decisoes/decisao-monorepo-vs-monolito.md
          - ORM vs. RLS: arquitetura/orm-rls-decisao.md
  - Referência Técnica:
      - Banco de dados (schema): referencia/banco-de-dados/visao-geral.md
      - Padrões de projeto: referencia/padroes-projeto.md
      - "Backend / API Gateway (repo próprio) ↗": https://github.com/TCC-Feedback-Analytics/feedback-analytics-api-gateway/tree/main/docs
      - "Frontend (repo próprio) ↗": https://github.com/TCC-Feedback-Analytics/feedback-analytics-web/tree/main/docs
      - "Serviço IA Analyze (repo próprio) ↗": https://github.com/TCC-Feedback-Analytics/feedback-analytics-ia-analyze/tree/main/docs
  - Guias:
      - Instalação: guias/guia-instalacao.md
      - CI/CD e deploy: guias/workflows.md
      - Testes:
          - Visão geral: guias/testes/visao-geral.md
          - Plano de teste estratégico: guias/testes/plano-estrategico.md
          - Frontend (web): guias/testes/web.md
          - API Gateway: guias/testes/api-gateway.md
          - IA Analyze: guias/testes/ia-analyze.md
          - Vitest & Playwright: guias/testes/vitest_playwright.md
          - Lacunas E2E: guias/testes/lucanas_e2e.md
